---
layout: default
title: Writing
---

<section class="listing-page" id="writing">
  <h1>Writing</h1>

  <ul class="post-list">
    {% for post in site.posts %}
    {% if post.category == "writing" %}
    <li class="post-list-item">
      <span class="post-list-year">{{ post.date | date: "%Y" }}</span>
      <div>
        <a href="{{ post.url }}">
          <div class="post-list-title">{{ post.title }}</div>
        </a>
        {% if post.description %}
        <div class="post-list-desc">{{ post.description }}</div>
        {% endif %}
      </div>
      <span class="post-list-cat">Writing</span>
    </li>
    {% endif %}
    {% endfor %}
  </ul>
</section>
